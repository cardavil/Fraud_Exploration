<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="build" content="2026-07-13-r25">
  <title>Fraud &amp; Compliance Exploration Board</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128737;</text></svg>">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <h1>Fraud &amp; Compliance Exploration Board</h1>
      </div>
      <div class="topbar-meta">
        <span class="pill pill-neutral">Dummy data</span>
      </div>
    </div>
  </header>

  <nav class="tabbar" aria-label="Sections">
    <div class="tabbar-inner" id="tabbar">
      <button class="tab-btn" data-tab="powerbi">Power BI</button>
      <button class="tab-btn" data-tab="data">Data</button>
      <button class="tab-btn" data-tab="eda">EDA</button>
      <button class="tab-btn" data-tab="findings">Findings</button>
      <button class="tab-btn" data-tab="ml">ML Model</button>
      <button class="tab-btn" data-tab="engine">AI Engine</button>
    </div>
  </nav>

  <main>
    <div id="global-error" class="banner banner-error hidden" role="alert"></div>
    <div id="global-loading" class="loading-cell">Loading the serving layer&hellip;</div>

    <section id="tab-powerbi" class="tab-panel hidden" aria-label="Power BI report"></section>
    <section id="tab-data" class="tab-panel hidden" aria-label="Data explorer"></section>
    <section id="tab-eda" class="tab-panel hidden" aria-label="Exploratory data analysis"></section>
    <section id="tab-findings" class="tab-panel hidden" aria-label="Findings"></section>
    <section id="tab-ml" class="tab-panel hidden" aria-label="ML model"></section>
    <section id="tab-engine" class="tab-panel hidden" aria-label="AI engine"></section>
  </main>

  <footer>
    <p>
      <a href="https://github.com/cardavil/Fraud_Exploration" target="_blank" rel="noopener">Repository</a>
    </p>
    <p>Personal portfolio project on a dummy dataset — no real customer data. Not affiliated with, or endorsed by, any payments company.</p>
  </footer>

  <div id="modal-backdrop" class="modal-backdrop hidden" role="presentation">
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h3 id="modal-title"></h3>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>
  <div id="chart-tooltip" class="chart-tooltip hidden" role="tooltip"></div>

  <script src="config.js"></script>
  <script src="js/core.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/iforest.js"></script>
  <script src="js/tab-powerbi.js"></script>
  <script src="js/tab-data.js"></script>
  <script src="js/tab-eda.js"></script>
  <script src="js/tab-findings.js"></script>
  <script src="js/tab-ml.js"></script>
  <script src="js/tab-engine.js"></script>
  <script>FE.boot();</script>
</body>
</html>
